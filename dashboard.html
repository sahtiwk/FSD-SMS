<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
        }

        nav {
            background-color: black;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: white;
        }

        th,
        td {
            border: 1px solid;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: beige;
        }
    </style>
</head>

<body>
    <nav>
        <a href="add-student.html">Add Student</a>
        <a href="logout.html">Logout</a>
    </nav>

    <h1>Dashboard</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>CGPA</th>
                <th>Branch</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

    <script>
        async function fetchStudents() {
            const tbody = document.querySelector('tbody');
            await fetch("http://localhost:3001/students")
                .then(response => response.json())
                .then(students => {
                    students.forEach(student => {
                        tbody.innerHTML += `
                    <tr>
                        <td>${student.name}</td>
                        <td>${student.rollNo}</td>
                        <td>${student.cgpa}</td>
                        <td>${student.branch}</td>
                        <td><a href="edit-student.html?rollNo=${student.rollNo}">edit</a> <a href="view-student.html?rollNo=${student.rollNo}">view</a></td>
                    </tr>
                    `
                    })
                })
        }

        fetchStudents();
    </script>

</body>

</html>
