<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Details</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        nav {
            background-color: black;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        input {
            padding: 6px;
            margin: 6px 0;
            width: 220px;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-student.html">Add Student</a>
        <a href="logout.html">Logout</a>
    </nav>

    <div class="container">
        <form>
            <h2>Add Student details</h2>
            <label>Name: </label><input id="name" type="text"> <br>
            <label>Roll No: </label><input id="rollNo" type="text"> <br>
            <label>CGPA: </label><input id="cgpa" type="number"> <br>
            <label>Branch: </label><input id="branch" type="text"> <br>
            <button type="submit" onclick="add()">Submit</button>
        </form>
    </div>

    <script>
        async function add() {
            name = document.getElementById("name").value;
            rollNo = document.getElementById("rollNo").value;
            cgpa = document.getElementById("cgpa").value;
            branch = document.getElementById("branch").value;

            const student = { name, rollNo, cgpa, branch };

            await fetch('http://localhost:3001/students', {
                method: 'POST', body: JSON.stringify(student)
            })
                .then(response => response.json())
                .then(data => {
                    alert("Student added successfully");
                    window.location.href = "dashboard.html"
                })
                .catch(err => console.log(err))
        }
    </script>
</body>

</html>
