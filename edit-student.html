<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        input {
            padding: 6px;
            margin: 6px 0;
            width: 220px;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
            background-color: black;
            color: white;
            align-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="view-student.html">
            <h2>Edit Student details</h2>
            <label>Name: </label><input type="text" placeholder="Sathwik"> <br>
            <label>Roll No: </label><input type="text" placeholder="23B81A05BC"> <br>
            <label>CGPA: </label><input type="number" placeholder="8.84"> <br>
            <label>Branch: </label><input type="text" placeholder="CSE"> <br>
            <button type="submit" onclick="editStudent()">Submit</button>
        </form>
    </div>

    <script>
        const rollNo = new URLSearchParams(window.location.search).get('rollNo');
        async function editStudent() {
            await fetch(`http://localhost:3001/students/${rollNo}`, { method: 'PUT' })
                .then(response => response.json())
                .then(data => {
                    alert("Student updated successfully");
                    window.location.href = "dashboard.html"
                })
                .catch(err => console.log(err))
        }
    </script>
</body>

</html>
