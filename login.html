<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
        }

        form {
            background-color: khaki;
            padding: 20px;
            border: 1px solid;
        }

        input {
            padding: 6px;
            margin: 6px 0;
            width: 220px;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="dashboard.html">
            <h2>Login into your account</h2>
            <label>Email: </label><input type="text" id="email" required><br>
            <label>Password:</label> <input type="password" id="pass" required><br>
            <button onclick="validate()" type="submit">Login</button>
        </form>
    </div>
    <p style="text-align: center;">Don't have an account? Register <a href="register.html">here</a></p>
    <script>
        async function validate() {
            event.preventDefault();
            var email = document.getElementById("email").value
            var pass = document.getElementById("pass").value

            await fetch("http://localhost:3001/users")
                .then(response => response.json())
                .then(users => {
                    users.forEach(user => {
                        if (user.email === email && user.password === pass) {
                            window.location.href = "dashboard.html"
                        }
                        else {
                            alert("Invalid Credentials");
                        }
                    })
                })
        }
    </script>
</body>

</html>
