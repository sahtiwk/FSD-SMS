<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        input {
            padding: 6px;
            margin: 6px 0;
            width: 220px;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
            background-color: black;
            color:white;
        }
    </style>
</head>
<body>
    <div class="container">
        <form action="dashboard.html">
            <h2>Login into your account</h2>
            <label>Email: </label><input type="text" required><br>
            <label>Password:</label> <input type="password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
