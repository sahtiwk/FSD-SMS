<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        input {
            padding: 6px;
            margin: 6px 0;
            width: 220px;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
            background-color: black;
            color: white;
        }

        .note {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="dashboard.html">
            <h2>Register your account</h2>
            <label for="username">Username: </label> <input id="username" type="text" placeholder="username"><br>
            <label for="email">Email: </label> <input id="email" type="text" placeholder="email"><br>
            <label for="password">Password: </label> <input id="password" type="password"> <br>
            <label for="confirm-password">Confirm Password: </label> <input id="confirm-password" type="password"><br>
            <button type="submit" onclick="save()">Register</button>
        </form>
    </div>

    <p class="note">Already have an account? Go here to <a href="login.html">login</a></p>
    <script>
        async function save() {
            event.preventDefault();
            uname = document.getElementById("username").value;
            email = document.getElementById("email").value;
            pass = document.getElementById("password").value;
            cp = document.getElementById("confirm-password").value;

            if (pass != cp) {
                alert("Passwords do not match!");
                return;
            }

            await fetch('http://localhost:3001/users',
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: uname, email: email, password: pass })
                })
                .then(response => response.json())
                .catch(err => console.log(err))

            window.location.href = "dashboard.html"
        }
    </script>
</body>

</html>
